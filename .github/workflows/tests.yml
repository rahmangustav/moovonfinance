# Menjalankan test unit di tests/ otomatis tiap push/PR ke main.
# Sebelumnya repo ini tidak punya CI sama sekali, jadi test yang sudah
# ditulis (tests/test_*.py) tidak pernah benar-benar dijalankan otomatis.

name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint dengan flake8 (cek error fatal saja)
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=fonts,assets,memory
    - name: Jalankan test unit
      run: |
        python -m unittest discover -s tests -v
